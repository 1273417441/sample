<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>網段数カウンター</title>
<style>
  :root {
    --bg: #0a0f0a;
    --panel: #111a11;
    --border: #1e3a1e;
    --green: #00e676;
    --green-dim: #00c853;
    --green-dark: #004d20;
    --amber: #ffab00;
    --red: #ff1744;
    --text: #c8e6c9;
    --text-dim: #558b5e;
    --font-mono: 'Courier New', monospace;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: var(--font-mono);
    height: 100dvh;
    display: flex;
    flex-direction: column;
    overflow: hidden;
    user-select: none;
    -webkit-user-select: none;
  }

  /* ── ヘッダー ── */
  #header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 8px 14px;
    background: var(--panel);
    border-bottom: 1px solid var(--border);
    flex-shrink: 0;
    gap: 8px;
  }

  #header h1 {
    font-size: 13px;
    letter-spacing: 0.15em;
    color: var(--green);
    text-transform: uppercase;
    white-space: nowrap;
  }

  .status-dot {
    width: 8px; height: 8px;
    border-radius: 50%;
    background: var(--text-dim);
    flex-shrink: 0;
    transition: background 0.2s;
  }
  .status-dot.active { background: var(--green); box-shadow: 0 0 6px var(--green); animation: pulse 1.5s infinite; }
  .status-dot.locked { background: var(--amber); box-shadow: 0 0 6px var(--amber); }

  @keyframes pulse {
    0%,100% { opacity: 1; } 50% { opacity: 0.4; }
  }

  /* ── カメラエリア ── */
  #camera-wrap {
    position: relative;
    flex: 1;
    overflow: hidden;
    background: #000;
  }

  #video {
    width: 100%; height: 100%;
    object-fit: cover;
    display: block;
  }

  #overlay {
    position: absolute;
    inset: 0;
    pointer-events: none;
  }

  /* 監視ライン */
  #watch-line {
    position: absolute;
    left: 0; right: 0;
    height: 2px;
    top: 50%;
    transform: translateY(-50%);
    pointer-events: none;
  }
  .wl-main {
    position: absolute;
    inset: 0;
    background: var(--green);
    opacity: 0.9;
    box-shadow: 0 0 8px var(--green);
    transition: background 0.1s, box-shadow 0.1s;
  }
  .wl-main.triggered {
    background: var(--amber);
    box-shadow: 0 0 16px var(--amber), 0 0 32px var(--amber);
  }
  .wl-label {
    position: absolute;
    right: 8px;
    top: 4px;
    font-size: 10px;
    color: var(--green);
    letter-spacing: 0.1em;
  }

  /* プロファイルグラフ（右端オーバーレイ） */
  #profile-canvas {
    position: absolute;
    right: 0;
    top: 0;
    bottom: 0;
    width: 60px;
    opacity: 0.85;
  }

  /* エッジ密度バー（上部） */
  #density-bar-wrap {
    position: absolute;
    top: 0; left: 0; right: 60px;
    height: 4px;
    background: rgba(0,0,0,0.4);
  }
  #density-bar {
    height: 100%;
    background: var(--green);
    width: 0%;
    transition: width 0.05s;
  }

  /* フラッシュ */
  #flash {
    position: absolute;
    inset: 0;
    background: rgba(0, 230, 118, 0.18);
    opacity: 0;
    pointer-events: none;
    transition: opacity 0.05s;
  }

  /* ── ボトムパネル ── */
  #bottom {
    background: var(--panel);
    border-top: 1px solid var(--border);
    flex-shrink: 0;
    display: flex;
    flex-direction: column;
    gap: 0;
  }

  /* カウント大表示 */
  #count-row {
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 10px 14px 6px;
    gap: 16px;
  }

  #count-display {
    font-size: 64px;
    font-weight: 700;
    color: var(--green);
    letter-spacing: -2px;
    line-height: 1;
    text-shadow: 0 0 20px rgba(0,230,118,0.4);
    transition: color 0.1s;
    min-width: 3ch;
    text-align: center;
  }
  #count-display.bump {
    color: #fff;
    text-shadow: 0 0 30px rgba(0,230,118,0.8);
  }

  .count-label {
    font-size: 11px;
    color: var(--text-dim);
    letter-spacing: 0.12em;
    text-transform: uppercase;
    line-height: 1.4;
  }

  /* メトリクス行 */
  #metrics-row {
    display: flex;
    padding: 4px 14px 8px;
    gap: 6px;
  }
  .metric {
    flex: 1;
    background: var(--green-dark);
    border: 1px solid var(--border);
    border-radius: 4px;
    padding: 5px 8px;
    text-align: center;
  }
  .metric-val {
    font-size: 18px;
    color: var(--text);
    line-height: 1;
  }
  .metric-lbl {
    font-size: 9px;
    color: var(--text-dim);
    letter-spacing: 0.1em;
    text-transform: uppercase;
    margin-top: 2px;
  }

  /* ボタン行 */
  #btn-row {
    display: flex;
    gap: 8px;
    padding: 0 14px 10px;
  }

  .btn {
    flex: 1;
    padding: 10px 4px;
    border: 1px solid var(--border);
    border-radius: 6px;
    background: transparent;
    color: var(--text-dim);
    font-family: var(--font-mono);
    font-size: 11px;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    cursor: pointer;
    -webkit-tap-highlight-color: transparent;
    transition: all 0.15s;
  }
  .btn:active { transform: scale(0.96); }
  .btn.primary {
    border-color: var(--green);
    color: var(--green);
    background: rgba(0,230,118,0.07);
  }
  .btn.primary:active { background: rgba(0,230,118,0.18); }
  .btn.danger {
    border-color: var(--red);
    color: var(--red);
  }

  /* スライダーパネル */
  #params-panel {
    padding: 0 14px 10px;
    display: none;
    flex-direction: column;
    gap: 8px;
  }
  #params-panel.open { display: flex; }
  .param-row {
    display: flex;
    align-items: center;
    gap: 8px;
  }
  .param-lbl {
    font-size: 10px;
    color: var(--text-dim);
    letter-spacing: 0.1em;
    width: 110px;
    flex-shrink: 0;
    text-transform: uppercase;
  }
  input[type=range] {
    flex: 1;
    accent-color: var(--green);
    height: 3px;
  }
  .param-val {
    font-size: 12px;
    color: var(--green);
    width: 32px;
    text-align: right;
  }

  /* デバッグログ */
  #debug-log {
    position: absolute;
    top: 8px; left: 8px;
    font-size: 10px;
    color: rgba(0,230,118,0.7);
    pointer-events: none;
    line-height: 1.5;
  }

  /* ロック表示 */
  #lock-indicator {
    position: absolute;
    left: 8px;
    top: 50%;
    transform: translateY(-50%);
    font-size: 10px;
    color: var(--amber);
    letter-spacing: 0.1em;
    opacity: 0;
    transition: opacity 0.2s;
  }
  #lock-indicator.show { opacity: 1; }
</style>
</head>
<body>

<!-- ヘッダー -->
<div id="header">
  <div class="status-dot" id="status-dot"></div>
  <h1>網段数カウンター</h1>
  <div style="display:flex;gap:8px;align-items:center">
    <span style="font-size:11px;color:var(--text-dim)" id="fps-label">--fps</span>
    <button class="btn" id="param-toggle" style="flex:none;padding:4px 10px;font-size:10px">⚙ 調整</button>
  </div>
</div>

<!-- カメラエリア -->
<div id="camera-wrap">
  <video id="video" autoplay playsinline muted></video>
  <canvas id="overlay" style="position:absolute;inset:0;width:100%;height:100%;"></canvas>
  <canvas id="profile-canvas"></canvas>

  <!-- 密度バー -->
  <div id="density-bar-wrap"><div id="density-bar"></div></div>

  <!-- 監視ライン -->
  <div id="watch-line">
    <div class="wl-main" id="wl-main"></div>
    <div class="wl-label">WATCH LINE</div>
  </div>

  <!-- フラッシュ -->
  <div id="flash"></div>

  <!-- デバッグ -->
  <div id="debug-log" id="debug-log"></div>

  <!-- ロック表示 -->
  <div id="lock-indicator">■ LOCKED</div>
</div>

<!-- ボトムパネル -->
<div id="bottom">

  <!-- パラメータパネル（折りたたみ） -->
  <div id="params-panel">
    <div class="param-row">
      <span class="param-lbl">エッジ閾値</span>
      <input type="range" id="p-threshold" min="10" max="80" value="30">
      <span class="param-val" id="v-threshold">30</span>
    </div>
    <div class="param-row">
      <span class="param-lbl">トリガーレベル</span>
      <input type="range" id="p-trigger" min="5" max="50" value="18">
      <span class="param-val" id="v-trigger">18</span>
    </div>
    <div class="param-row">
      <span class="param-lbl">ロック幅(px)</span>
      <input type="range" id="p-lockzone" min="5" max="80" value="25">
      <span class="param-val" id="v-lockzone">25</span>
    </div>
    <div class="param-row">
      <span class="param-lbl">監視帯域(px)</span>
      <input type="range" id="p-bandwidth" min="4" max="40" value="12">
      <span class="param-val" id="v-bandwidth">12</span>
    </div>
  </div>

  <!-- カウント -->
  <div id="count-row">
    <div>
      <div class="count-label">段数</div>
      <div class="count-label" style="color:var(--text-dim);font-size:9px">ROWS</div>
    </div>
    <div id="count-display">0</div>
    <div style="display:flex;flex-direction:column;gap:4px">
      <button class="btn danger" id="btn-reset" style="padding:6px 12px">RESET</button>
      <button class="btn" id="btn-minus1" style="padding:6px 12px">-1</button>
    </div>
  </div>

  <!-- メトリクス -->
  <div id="metrics-row">
    <div class="metric">
      <div class="metric-val" id="m-density">0</div>
      <div class="metric-lbl">密度%</div>
    </div>
    <div class="metric">
      <div class="metric-val" id="m-peak">0</div>
      <div class="metric-lbl">ピーク</div>
    </div>
    <div class="metric">
      <div class="metric-val" id="m-state">---</div>
      <div class="metric-lbl">状態</div>
    </div>
    <div class="metric">
      <div class="metric-val" id="m-interval">--</div>
      <div class="metric-lbl">間隔(s)</div>
    </div>
  </div>

  <!-- ボタン行 -->
  <div id="btn-row">
    <button class="btn primary" id="btn-start">▶ カメラ開始</button>
    <button class="btn" id="btn-edge-toggle">エッジ表示</button>
  </div>
</div>

<script>
// ───────────────────────────────────────────
//  状態
// ───────────────────────────────────────────
const state = {
  running: false,
  count: 0,
  // パラメータ
  threshold: 30,    // Cannyエッジ閾値（簡易版）
  triggerLevel: 18, // トリガー密度(%)
  lockZone: 25,     // カウント後のロック幅(px)相当
  bandwidth: 12,    // 監視帯域の半幅(px)

  // 検出ロジック
  edgeDensity: 0,
  peakDensity: 0,
  phase: 'WAIT',    // WAIT | RISING | PEAK | FALLING
  locked: false,
  lockTimer: null,

  // 連続フレーム状態
  prevDensity: 0,
  risingCount: 0,
  fallingCount: 0,

  lastCountTime: 0,
  intervalMs: 0,

  showEdge: false,
  frameCount: 0,
  lastFpsTime: 0,
  fps: 0,
};

// ───────────────────────────────────────────
//  DOM
// ───────────────────────────────────────────
const video       = document.getElementById('video');
const overlayEl   = document.getElementById('overlay');
const profileCanvas = document.getElementById('profile-canvas');
const profileCtx  = profileCanvas.getContext('2d');
const densityBar  = document.getElementById('density-bar');
const flash       = document.getElementById('flash');
const wlMain      = document.getElementById('wl-main');
const statusDot   = document.getElementById('status-dot');
const countDisplay= document.getElementById('count-display');
const fpsLabel    = document.getElementById('fps-label');
const lockInd     = document.getElementById('lock-indicator');
const debugLog    = document.getElementById('debug-log');

const mDensity = document.getElementById('m-density');
const mPeak    = document.getElementById('m-peak');
const mState   = document.getElementById('m-state');
const mInterval= document.getElementById('m-interval');

// ─ offscreen canvas for processing ─
const proc = document.createElement('canvas');
const pctx = proc.getContext('2d', { willReadFrequently: true });

// ─ overlay ctx ─
const octx = overlayEl.getContext('2d');

// ───────────────────────────────────────────
//  カメラ起動
// ───────────────────────────────────────────
document.getElementById('btn-start').addEventListener('click', async () => {
  if (state.running) return;
  try {
    const stream = await navigator.mediaDevices.getUserMedia({
      video: {
        facingMode: { ideal: 'environment' },
        width: { ideal: 1280 },
        height: { ideal: 720 },
      }
    });
    video.srcObject = stream;
    await video.play();
    state.running = true;
    statusDot.className = 'status-dot active';
    document.getElementById('btn-start').textContent = '■ 停止';
    document.getElementById('btn-start').classList.remove('primary');
    requestAnimationFrame(loop);
  } catch(e) {
    alert('カメラアクセスエラー: ' + e.message);
  }
});

// 停止は同じボタンで
document.getElementById('btn-start').addEventListener('click', () => {
  if (!state.running) return;
  // 2回目クリックで停止
}, { once: false });

// ───────────────────────────────────────────
//  メインループ
// ───────────────────────────────────────────
function loop(ts) {
  if (!state.running) return;
  requestAnimationFrame(loop);

  // FPS計算
  state.frameCount++;
  if (ts - state.lastFpsTime > 1000) {
    state.fps = state.frameCount;
    state.frameCount = 0;
    state.lastFpsTime = ts;
    fpsLabel.textContent = state.fps + 'fps';
  }

  if (video.readyState < 2) return;

  const vw = video.videoWidth;
  const vh = video.videoHeight;
  if (!vw || !vh) return;

  // オーバーレイキャンバスサイズ同期
  const dw = video.clientWidth;
  const dh = video.clientHeight;
  if (overlayEl.width !== dw || overlayEl.height !== dh) {
    overlayEl.width  = dw;
    overlayEl.height = dh;
    profileCanvas.width  = 60;
    profileCanvas.height = dh;
  }

  // 処理解像度（軽量化）
  const PW = 160;
  const PH = Math.round(vh / vw * PW);
  proc.width  = PW;
  proc.height = PH;

  // ビデオフレームをoffscreenに描画
  pctx.drawImage(video, 0, 0, PW, PH);
  const imgData = pctx.getImageData(0, 0, PW, PH);
  const data = imgData.data;

  // ── グレースケール変換 ──
  const gray = new Uint8Array(PW * PH);
  for (let i = 0; i < PW * PH; i++) {
    const b = i * 4;
    gray[i] = (data[b] * 77 + data[b+1] * 150 + data[b+2] * 29) >> 8;
  }

  // ── 簡易Sobelエッジ検出 ──
  const edge = new Uint8Array(PW * PH);
  const T = state.threshold;
  for (let y = 1; y < PH - 1; y++) {
    for (let x = 1; x < PW - 1; x++) {
      const idx = y * PW + x;
      const gx = -gray[idx-PW-1] + gray[idx-PW+1]
                 -2*gray[idx-1]   + 2*gray[idx+1]
                 -gray[idx+PW-1]  + gray[idx+PW+1];
      const gy = -gray[idx-PW-1] - 2*gray[idx-PW] - gray[idx-PW+1]
                 + gray[idx+PW-1] + 2*gray[idx+PW] + gray[idx+PW+1];
      const mag = Math.sqrt(gx*gx + gy*gy);
      edge[idx] = mag > T ? 255 : 0;
    }
  }

  // ── 横方向プロファイル（行ごとのエッジ密度） ──
  const profile = new Float32Array(PH);
  for (let y = 0; y < PH; y++) {
    let cnt = 0;
    for (let x = 0; x < PW; x++) {
      if (edge[y * PW + x]) cnt++;
    }
    profile[y] = cnt / PW * 100; // %
  }

  // ── 監視ライン帯域のエッジ密度計算 ──
  const centerY   = Math.round(PH / 2);
  const bw        = state.bandwidth;
  const y0        = Math.max(0, centerY - bw);
  const y1        = Math.min(PH - 1, centerY + bw);
  let bandDensity = 0;
  for (let y = y0; y <= y1; y++) bandDensity += profile[y];
  bandDensity /= (y1 - y0 + 1);

  state.edgeDensity = bandDensity;
  if (bandDensity > state.peakDensity) state.peakDensity = bandDensity;

  // ── 検出ステートマシン ──
  detectCount(bandDensity);

  // ── UI更新 ──
  densityBar.style.width = Math.min(100, bandDensity * 3) + '%';
  densityBar.style.background = bandDensity > state.triggerLevel ? 'var(--amber)' : 'var(--green)';
  mDensity.textContent = bandDensity.toFixed(1);
  mPeak.textContent    = state.peakDensity.toFixed(1);
  mState.textContent   = state.phase;

  // ── オーバーレイ描画 ──
  drawOverlay(dw, dh, PW, PH, edge, profile, centerY, bw);
  drawProfile(profile, PH, dh, centerY, bw);
}

// ───────────────────────────────────────────
//  検出ステートマシン
// ───────────────────────────────────────────
const RISE_FRAMES  = 2;  // 連続上昇フレーム数でRISINGと判定
const FALL_FRAMES  = 2;  // 連続下降フレーム数でFALLINGと判定
const LOCK_FRAMES  = 8;  // カウント後ロックするフレーム数

let lockCounter = 0;

function detectCount(density) {
  const trig = state.triggerLevel;

  if (lockCounter > 0) {
    lockCounter--;
    if (lockCounter === 0) {
      state.locked = false;
      state.phase  = 'WAIT';
      wlMain.classList.remove('triggered');
      lockInd.classList.remove('show');
      statusDot.className = 'status-dot active';
    }
  }

  if (state.locked) {
    state.prevDensity = density;
    return;
  }

  const diff = density - state.prevDensity;

  if (diff > 0.5) {
    state.risingCount++;
    state.fallingCount = 0;
  } else if (diff < -0.5) {
    state.fallingCount++;
    state.risingCount = 0;
  } else {
    state.risingCount  = 0;
    state.fallingCount = 0;
  }

  switch (state.phase) {
    case 'WAIT':
      if (density > trig && state.risingCount >= RISE_FRAMES) {
        state.phase = 'RISING';
      }
      break;

    case 'RISING':
      if (state.fallingCount >= FALL_FRAMES) {
        state.phase = 'PEAK';
      }
      if (density < trig * 0.5) {
        state.phase = 'WAIT';
      }
      break;

    case 'PEAK':
      // ピークを過ぎて密度が下がり始めた＝節の帯が通過した
      if (density < trig) {
        triggerCount();
      }
      break;
  }

  state.prevDensity = density;
}

function triggerCount() {
  const now = Date.now();
  if (state.lastCountTime > 0) {
    state.intervalMs = now - state.lastCountTime;
    mInterval.textContent = (state.intervalMs / 1000).toFixed(1);
  }
  state.lastCountTime = now;

  state.count++;
  state.peakDensity = 0; // ピークリセット
  updateCountDisplay();

  // ロック
  state.locked   = true;
  state.phase    = 'LOCKED';
  lockCounter    = LOCK_FRAMES;
  wlMain.classList.add('triggered');
  lockInd.classList.add('show');
  statusDot.className = 'status-dot locked';

  // フラッシュ
  flash.style.opacity = '1';
  setTimeout(() => { flash.style.opacity = '0'; }, 120);

  // カウント数字バンプ
  countDisplay.classList.add('bump');
  setTimeout(() => countDisplay.classList.remove('bump'), 200);
}

// ───────────────────────────────────────────
//  オーバーレイ描画
// ───────────────────────────────────────────
function drawOverlay(dw, dh, PW, PH, edge, profile, centerY, bw) {
  octx.clearRect(0, 0, dw, dh);

  const scaleX = dw / PW;
  const scaleY = dh / PH;

  if (state.showEdge) {
    // エッジピクセルを緑でオーバーレイ
    const imgOut = octx.createImageData(dw, dh);
    for (let y = 0; y < PH; y++) {
      for (let x = 0; x < PW; x++) {
        if (edge[y * PW + x]) {
          const dx0 = Math.floor(x * scaleX);
          const dy0 = Math.floor(y * scaleY);
          const dx1 = Math.ceil((x+1) * scaleX);
          const dy1 = Math.ceil((y+1) * scaleY);
          for (let py = dy0; py < dy1; py++) {
            for (let px = dx0; px < dx1; px++) {
              const idx = (py * dw + px) * 4;
              imgOut.data[idx]   = 0;
              imgOut.data[idx+1] = 230;
              imgOut.data[idx+2] = 118;
              imgOut.data[idx+3] = 160;
            }
          }
        }
      }
    }
    octx.putImageData(imgOut, 0, 0);
  }

  // 監視帯域ハイライト
  const cy = dh / 2;
  const bwD = bw * scaleY;
  octx.fillStyle = 'rgba(0,230,118,0.06)';
  octx.fillRect(0, cy - bwD, dw - 60, bwD * 2);

  // 帯域ボーダー
  octx.strokeStyle = 'rgba(0,230,118,0.3)';
  octx.lineWidth = 1;
  octx.setLineDash([4, 4]);
  octx.beginPath();
  octx.moveTo(0, cy - bwD); octx.lineTo(dw - 60, cy - bwD);
  octx.moveTo(0, cy + bwD); octx.lineTo(dw - 60, cy + bwD);
  octx.stroke();
  octx.setLineDash([]);
}

// ───────────────────────────────────────────
//  プロファイルグラフ描画（右端縦バー）
// ───────────────────────────────────────────
function drawProfile(profile, PH, dh, centerY, bw) {
  const pw = 60;
  profileCtx.clearRect(0, 0, pw, dh);

  // 背景
  profileCtx.fillStyle = 'rgba(0,0,0,0.6)';
  profileCtx.fillRect(0, 0, pw, dh);

  // 監視帯域ハイライト
  const scaleY = dh / PH;
  const cy = dh / 2;
  const bwD = bw * scaleY;
  profileCtx.fillStyle = 'rgba(0,230,118,0.12)';
  profileCtx.fillRect(0, cy - bwD, pw, bwD * 2);

  // プロファイル折れ線
  profileCtx.beginPath();
  profileCtx.strokeStyle = 'rgba(0,230,118,0.8)';
  profileCtx.lineWidth = 1.5;
  for (let y = 0; y < PH; y++) {
    const px = profile[y] / 50 * (pw - 4);
    const py = y / PH * dh;
    if (y === 0) profileCtx.moveTo(4 + px, py);
    else         profileCtx.lineTo(4 + px, py);
  }
  profileCtx.stroke();

  // トリガーライン
  const tx = state.triggerLevel / 50 * (pw - 4) + 4;
  profileCtx.beginPath();
  profileCtx.strokeStyle = 'rgba(255,171,0,0.6)';
  profileCtx.lineWidth = 1;
  profileCtx.setLineDash([3, 3]);
  profileCtx.moveTo(tx, 0); profileCtx.lineTo(tx, dh);
  profileCtx.stroke();
  profileCtx.setLineDash([]);

  // ラベル
  profileCtx.fillStyle = 'rgba(85,139,94,0.9)';
  profileCtx.font = '9px Courier New';
  profileCtx.fillText('EDGE', 2, 12);
}

// ───────────────────────────────────────────
//  UI helpers
// ───────────────────────────────────────────
function updateCountDisplay() {
  countDisplay.textContent = state.count;
}

// リセット
document.getElementById('btn-reset').addEventListener('click', () => {
  state.count       = 0;
  state.peakDensity = 0;
  state.phase       = 'WAIT';
  state.locked      = false;
  lockCounter       = 0;
  state.prevDensity = 0;
  state.lastCountTime = 0;
  mInterval.textContent = '--';
  updateCountDisplay();
});

// -1修正
document.getElementById('btn-minus1').addEventListener('click', () => {
  if (state.count > 0) { state.count--; updateCountDisplay(); }
});

// エッジ表示トグル
document.getElementById('btn-edge-toggle').addEventListener('click', function() {
  state.showEdge = !state.showEdge;
  this.style.borderColor = state.showEdge ? 'var(--green)' : '';
  this.style.color       = state.showEdge ? 'var(--green)' : '';
});

// パラメータパネル
document.getElementById('param-toggle').addEventListener('click', () => {
  const p = document.getElementById('params-panel');
  p.classList.toggle('open');
});

// スライダー連動
function bindSlider(id, valId, stateKey, fn) {
  const el = document.getElementById(id);
  const vl = document.getElementById(valId);
  el.addEventListener('input', () => {
    const v = fn ? fn(+el.value) : +el.value;
    state[stateKey] = v;
    vl.textContent  = el.value;
  });
}
bindSlider('p-threshold',  'v-threshold',  'threshold',   null);
bindSlider('p-trigger',    'v-trigger',    'triggerLevel', null);
bindSlider('p-lockzone',   'v-lockzone',   'lockZone',    null);
bindSlider('p-bandwidth',  'v-bandwidth',  'bandwidth',   null);
</script>

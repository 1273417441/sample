<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>網段数カウンター</title>
<style>
  :root {
    --bg: #0a0f0a;
    --panel: #111a11;
    --border: #1e3a1e;
    --green: #00e676;
    --amber: #ffab00;
    --red: #ff1744;
    --blue: #40c4ff;
    --text: #c8e6c9;
    --text-dim: #558b5e;
    --green-dark: #004d20;
    --font-mono: 'Courier New', monospace;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    background: var(--bg);
    color: var(--text);
    font-family: var(--font-mono);
    height: 100dvh;
    display: flex;
    flex-direction: column;
    overflow: hidden;
    user-select: none;
    -webkit-user-select: none;
  }

  /* ヘッダー */
  #header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 8px 14px;
    background: var(--panel);
    border-bottom: 1px solid var(--border);
    flex-shrink: 0;
    gap: 8px;
  }
  #header h1 { font-size: 13px; letter-spacing: 0.15em; color: var(--green); text-transform: uppercase; white-space: nowrap; }
  .status-dot { width: 8px; height: 8px; border-radius: 50%; background: var(--text-dim); flex-shrink: 0; transition: background 0.2s; }
  .status-dot.active  { background: var(--green); box-shadow: 0 0 6px var(--green); animation: pulse 1.5s infinite; }
  .status-dot.locked  { background: var(--amber); box-shadow: 0 0 6px var(--amber); }
  .status-dot.tmpl    { background: var(--blue);  box-shadow: 0 0 6px var(--blue); }
  @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.4} }

  /* カメラエリア */
  #camera-wrap { position: relative; flex: 1; overflow: hidden; background: #000; }
  #video { width: 100%; height: 100%; object-fit: cover; display: block; }
  #overlay { position: absolute; inset: 0; pointer-events: none; }

  /* 相関スコアバー（上部） */
  #score-bar-wrap {
    position: absolute;
    top: 0; left: 0; right: 70px;
    height: 6px;
    background: rgba(0,0,0,0.5);
  }
  #score-bar {
    height: 100%;
    background: var(--green);
    width: 0%;
    transition: width 0.05s;
  }
  #score-bar.over { background: var(--amber); }

  /* テンプレート枠（画面中央） */
  #tmpl-frame {
    position: absolute;
    left: 0; right: 70px;
    border: 2px dashed var(--blue);
    pointer-events: none;
    display: none;
  }
  #tmpl-frame.show { display: block; }
  #tmpl-frame-label {
    position: absolute;
    top: -18px; left: 0;
    font-size: 10px;
    color: var(--blue);
    letter-spacing: 0.1em;
    background: rgba(0,0,0,0.6);
    padding: 1px 4px;
  }

  /* 右端グラフ */
  #score-canvas {
    position: absolute;
    right: 0; top: 0; bottom: 0;
    width: 70px;
    opacity: 0.9;
  }

  /* フラッシュ */
  #flash {
    position: absolute; inset: 0;
    background: rgba(0,230,118,0.18);
    opacity: 0; pointer-events: none;
    transition: opacity 0.05s;
  }

  /* ロック表示 */
  #lock-indicator {
    position: absolute; left: 8px; top: 50%;
    transform: translateY(-50%);
    font-size: 10px; color: var(--amber);
    letter-spacing: 0.1em;
    opacity: 0; transition: opacity 0.2s;
    background: rgba(0,0,0,0.6); padding: 2px 6px; border-radius: 3px;
  }
  #lock-indicator.show { opacity: 1; }

  /* テンプレート登録済み表示 */
  #tmpl-badge {
    position: absolute; right: 78px; top: 8px;
    font-size: 10px; color: var(--blue);
    letter-spacing: 0.08em;
    background: rgba(0,0,0,0.7); padding: 2px 6px; border-radius: 3px;
    display: none;
  }
  #tmpl-badge.show { display: block; }

  /* ボトムパネル */
  #bottom {
    background: var(--panel);
    border-top: 1px solid var(--border);
    flex-shrink: 0;
  }

  /* テンプレート登録ボタン（目立たせる） */
  #tmpl-section {
    padding: 8px 14px 0;
    display: flex;
    gap: 8px;
    align-items: center;
  }
  #btn-capture {
    flex: 1;
    padding: 11px 4px;
    border: 2px solid var(--blue);
    border-radius: 6px;
    background: rgba(64,196,255,0.1);
    color: var(--blue);
    font-family: var(--font-mono);
    font-size: 12px;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    cursor: pointer;
    -webkit-tap-highlight-color: transparent;
    transition: all 0.15s;
  }
  #btn-capture:active { transform: scale(0.96); background: rgba(64,196,255,0.25); }
  #btn-capture.registered {
    border-color: var(--green);
    color: var(--green);
    background: rgba(0,230,118,0.08);
  }
  .tmpl-hint {
    font-size: 10px; color: var(--text-dim);
    letter-spacing: 0.05em; line-height: 1.4;
  }

  /* カウント行 */
  #count-row {
    display: flex; align-items: center; justify-content: center;
    padding: 6px 14px 4px; gap: 16px;
  }
  #count-display {
    font-size: 64px; font-weight: 700; color: var(--green);
    letter-spacing: -2px; line-height: 1;
    text-shadow: 0 0 20px rgba(0,230,118,0.4);
    transition: color 0.1s; min-width: 3ch; text-align: center;
  }
  #count-display.bump { color: #fff; text-shadow: 0 0 30px rgba(0,230,118,0.8); }
  .count-label { font-size: 11px; color: var(--text-dim); letter-spacing: 0.12em; text-transform: uppercase; line-height: 1.4; }

  /* メトリクス */
  #metrics-row { display: flex; padding: 4px 14px 6px; gap: 6px; }
  .metric {
    flex: 1; background: var(--green-dark);
    border: 1px solid var(--border); border-radius: 4px;
    padding: 5px 8px; text-align: center;
  }
  .metric-val { font-size: 16px; color: var(--text); line-height: 1; }
  .metric-lbl { font-size: 9px; color: var(--text-dim); letter-spacing: 0.1em; text-transform: uppercase; margin-top: 2px; }

  /* ボタン行 */
  #btn-row { display: flex; gap: 8px; padding: 0 14px 10px; }
  .btn {
    flex: 1; padding: 9px 4px;
    border: 1px solid var(--border); border-radius: 6px;
    background: transparent; color: var(--text-dim);
    font-family: var(--font-mono); font-size: 11px;
    letter-spacing: 0.12em; text-transform: uppercase;
    cursor: pointer; -webkit-tap-highlight-color: transparent;
    transition: all 0.15s;
  }
  .btn:active { transform: scale(0.96); }
  .btn.primary { border-color: var(--green); color: var(--green); background: rgba(0,230,118,0.07); }
  .btn.danger  { border-color: var(--red); color: var(--red); }

  /* 調整パネル */
  #params-panel { padding: 0 14px 8px; display: none; flex-direction: column; gap: 6px; }
  #params-panel.open { display: flex; }
  .param-row { display: flex; align-items: center; gap: 8px; }
  .param-lbl { font-size: 10px; color: var(--text-dim); letter-spacing: 0.1em; width: 120px; flex-shrink: 0; text-transform: uppercase; }
  input[type=range] { flex: 1; accent-color: var(--green); height: 3px; }
  .param-val { font-size: 12px; color: var(--green); width: 36px; text-align: right; }
</style>
</head>
<body>

<!-- ヘッダー -->
<div id="header">
  <div class="status-dot" id="status-dot"></div>
  <h1>網段数カウンター</h1>
  <div style="display:flex;gap:8px;align-items:center">
    <span style="font-size:11px;color:var(--text-dim)" id="fps-label">--fps</span>
    <button class="btn" id="param-toggle" style="flex:none;padding:4px 10px;font-size:10px">⚙ 調整</button>
  </div>
</div>

<!-- カメラエリア -->
<div id="camera-wrap">
  <video id="video" autoplay playsinline muted></video>
  <canvas id="overlay" style="position:absolute;inset:0;width:100%;height:100%;"></canvas>
  <canvas id="score-canvas"></canvas>

  <!-- 相関スコアバー -->
  <div id="score-bar-wrap"><div id="score-bar"></div></div>

  <!-- テンプレート枠 -->
  <div id="tmpl-frame" class="show">
    <div id="tmpl-frame-label">TEMPLATE ZONE</div>
  </div>

  <!-- フラッシュ -->
  <div id="flash"></div>

  <!-- ロック表示 -->
  <div id="lock-indicator">■ LOCKED</div>

  <!-- テンプレート登録済みバッジ -->
  <div id="tmpl-badge">■ TMPL OK</div>
</div>

<!-- ボトムパネル -->
<div id="bottom">

  <!-- テンプレート登録 -->
  <div id="tmpl-section">
    <button id="btn-capture">📷 テンプレート登録</button>
    <div class="tmpl-hint">網が映ったら<br>このボタンを押す</div>
  </div>

  <!-- 調整パネル -->
  <div id="params-panel">
    <div class="param-row">
      <span class="param-lbl">トリガー閾値</span>
      <input type="range" id="p-trigger" min="10" max="90" value="50">
      <span class="param-val" id="v-trigger">50</span>
    </div>
    <div class="param-row">
      <span class="param-lbl">UNLOCK閾値</span>
      <input type="range" id="p-unlock" min="5" max="60" value="25">
      <span class="param-val" id="v-unlock">25</span>
    </div>
    <div class="param-row">
      <span class="param-lbl">テンプレート高さ</span>
      <input type="range" id="p-tmplh" min="10" max="60" value="30">
      <span class="param-val" id="v-tmplh">30%</span>
    </div>
  </div>

  <!-- カウント -->
  <div id="count-row">
    <div>
      <div class="count-label">段数</div>
      <div class="count-label" style="color:var(--text-dim);font-size:9px">ROWS</div>
    </div>
    <div id="count-display">0</div>
    <div style="display:flex;flex-direction:column;gap:4px">
      <button class="btn danger" id="btn-reset" style="padding:6px 12px">RESET</button>
      <button class="btn" id="btn-minus1" style="padding:6px 12px">-1</button>
    </div>
  </div>

  <!-- メトリクス -->
  <div id="metrics-row">
    <div class="metric">
      <div class="metric-val" id="m-score">0.0</div>
      <div class="metric-lbl">相関%</div>
    </div>
    <div class="metric">
      <div class="metric-val" id="m-peak">0.0</div>
      <div class="metric-lbl">ピーク</div>
    </div>
    <div class="metric">
      <div class="metric-val" id="m-state">NO TMPL</div>
      <div class="metric-lbl">状態</div>
    </div>
    <div class="metric">
      <div class="metric-val" id="m-interval">--</div>
      <div class="metric-lbl">間隔(s)</div>
    </div>
  </div>

  <!-- ボタン行 -->
  <div id="btn-row">
    <button class="btn primary" id="btn-start">▶ カメラ開始</button>
    <button class="btn" id="btn-overlay-toggle">マッチ表示</button>
  </div>
</div>

<script>
// ─────────────────────────────────────────
//  状態
// ─────────────────────────────────────────
const state = {
  running: false,
  count: 0,

  // パラメータ
  triggerThresh: 50,   // カウントトリガー相関スコア(%)
  unlockThresh:  25,   // LOCK解除する相関スコア(%)
  tmplHeightPct: 30,   // テンプレート高さ（画面高さ%）

  // テンプレート
  tmplGray: null,      // Float32Array
  tmplW: 0,
  tmplH: 0,
  tmplMean: 0,
  tmplStd: 0,

  // 検出
  score: 0,
  peakScore: 0,
  phase: 'NO_TMPL',   // NO_TMPL | WAIT | RISING | LOCKED
  lastCountTime: 0,

  // 表示
  showOverlay: false,
  frameCount: 0,
  lastFpsTime: 0,
  fps: 0,
};

// スコア履歴（グラフ用）
const SCORE_HISTORY = 120;
const scoreHistory = new Float32Array(SCORE_HISTORY);
let scoreHistIdx = 0;

// ─────────────────────────────────────────
//  DOM
// ─────────────────────────────────────────
const video       = document.getElementById('video');
const overlayEl   = document.getElementById('overlay');
const scoreCanvas = document.getElementById('score-canvas');
const sctx        = scoreCanvas.getContext('2d');
const scoreBar    = document.getElementById('score-bar');
const flash       = document.getElementById('flash');
const statusDot   = document.getElementById('status-dot');
const countDisplay= document.getElementById('count-display');
const fpsLabel    = document.getElementById('fps-label');
const lockInd     = document.getElementById('lock-indicator');
const tmplBadge   = document.getElementById('tmpl-badge');
const tmplFrame   = document.getElementById('tmpl-frame');
const btnCapture  = document.getElementById('btn-capture');
const mScore      = document.getElementById('m-score');
const mPeak       = document.getElementById('m-peak');
const mState      = document.getElementById('m-state');
const mInterval   = document.getElementById('m-interval');
const octx        = overlayEl.getContext('2d');

// 処理用offscreen canvas
const proc = document.createElement('canvas');
const pctx = proc.getContext('2d', { willReadFrequently: true });

// ─────────────────────────────────────────
//  カメラ起動
// ─────────────────────────────────────────
let started = false;
document.getElementById('btn-start').addEventListener('click', async () => {
  if (started) return;
  started = true;
  try {
    const stream = await navigator.mediaDevices.getUserMedia({
      video: { facingMode: { ideal: 'environment' }, width: { ideal: 1280 }, height: { ideal: 720 } }
    });
    video.srcObject = stream;
    await video.play();
    state.running = true;
    statusDot.className = 'status-dot active';
    document.getElementById('btn-start').textContent = '■ 停止';
    document.getElementById('btn-start').classList.remove('primary');
    requestAnimationFrame(loop);
  } catch(e) {
    alert('カメラエラー: ' + e.message);
    started = false;
  }
});

// ─────────────────────────────────────────
//  テンプレート登録
// ─────────────────────────────────────────
btnCapture.addEventListener('click', () => {
  if (!state.running || video.readyState < 2) return;

  const vw = video.videoWidth;
  const vh = video.videoHeight;

  // 処理解像度でキャプチャ
  const PW = 160;
  const PH = Math.round(vh / vw * PW);
  proc.width  = PW;
  proc.height = PH;
  pctx.drawImage(video, 0, 0, PW, PH);

  // テンプレート領域（中央 tmplHeightPct%）
  const th = Math.max(6, Math.round(PH * state.tmplHeightPct / 100));
  const ty = Math.round((PH - th) / 2);

  const imgData = pctx.getImageData(0, ty, PW, th);
  const d = imgData.data;
  const gray = new Float32Array(PW * th);
  for (let i = 0; i < PW * th; i++) {
    const b = i * 4;
    gray[i] = (d[b] * 77 + d[b+1] * 150 + d[b+2] * 29) / 255 / 256 * 256;
  }

  // 平均・標準偏差
  let sum = 0;
  for (let i = 0; i < gray.length; i++) sum += gray[i];
  const mean = sum / gray.length;
  let variance = 0;
  for (let i = 0; i < gray.length; i++) variance += (gray[i] - mean) ** 2;
  const std = Math.sqrt(variance / gray.length);

  state.tmplGray = gray;
  state.tmplW    = PW;
  state.tmplH    = th;
  state.tmplMean = mean;
  state.tmplStd  = std || 1;
  state.phase    = 'WAIT';
  state.peakScore = 0;

  btnCapture.textContent = '✓ テンプレート登録済み';
  btnCapture.classList.add('registered');
  tmplBadge.classList.add('show');
  statusDot.className = 'status-dot active';

  // テンプレート枠を一瞬光らせる
  tmplFrame.style.borderColor = 'var(--green)';
  setTimeout(() => { tmplFrame.style.borderColor = ''; }, 400);
});

// ─────────────────────────────────────────
//  メインループ
// ─────────────────────────────────────────
function loop(ts) {
  if (!state.running) return;
  requestAnimationFrame(loop);

  // FPS
  state.frameCount++;
  if (ts - state.lastFpsTime > 1000) {
    state.fps = state.frameCount;
    state.frameCount = 0;
    state.lastFpsTime = ts;
    fpsLabel.textContent = state.fps + 'fps';
  }

  if (video.readyState < 2) return;
  const vw = video.videoWidth;
  const vh = video.videoHeight;
  if (!vw || !vh) return;

  // オーバーレイサイズ同期
  const dw = video.clientWidth;
  const dh = video.clientHeight;
  if (overlayEl.width !== dw || overlayEl.height !== dh) {
    overlayEl.width  = dw;
    overlayEl.height = dh;
    scoreCanvas.width  = 70;
    scoreCanvas.height = dh;
    updateTmplFrame(dw, dh);
  }

  // テンプレート未登録なら描画だけ
  if (!state.tmplGray) {
    drawScoreGraph(dh);
    return;
  }

  // 処理解像度
  const PW = state.tmplW;
  const PH = Math.round(vh / vw * PW);
  proc.width  = PW;
  proc.height = PH;
  pctx.drawImage(video, 0, 0, PW, PH);
  const imgData = pctx.getImageData(0, 0, PW, PH);
  const d = imgData.data;

  // グレースケール
  const gray = new Float32Array(PW * PH);
  for (let i = 0; i < PW * PH; i++) {
    const b = i * 4;
    gray[i] = (d[b] * 77 + d[b+1] * 150 + d[b+2] * 29) / 255 / 256 * 256;
  }

  // ── NCC（正規化相互相関）──
  // テンプレートを画面中央の±tmplH行と照合
  const score = computeNCC(gray, PW, PH);

  state.score = score;
  if (score > state.peakScore) state.peakScore = score;
  scoreHistory[scoreHistIdx % SCORE_HISTORY] = score;
  scoreHistIdx++;

  // 検出
  detectCount(score);

  // UI更新
  const scorePct = Math.max(0, score);
  scoreBar.style.width = scorePct + '%';
  scoreBar.className = score >= state.triggerThresh ? 'over' : '';
  mScore.textContent = score.toFixed(1);
  mPeak.textContent  = state.peakScore.toFixed(1);
  mState.textContent = state.phase;

  // オーバーレイ描画
  drawOverlay(dw, dh, PW, PH, gray, score);
  drawScoreGraph(dh);
}

// ─────────────────────────────────────────
//  NCC計算（中央帯とテンプレートを比較）
// ─────────────────────────────────────────
function computeNCC(gray, PW, PH) {
  const th = state.tmplH;
  const ty = Math.round((PH - th) / 2);

  // 現在フレームの対応領域を切り出し
  const n = PW * th;
  let sum = 0;
  for (let y = 0; y < th; y++) {
    for (let x = 0; x < PW; x++) {
      sum += gray[(ty + y) * PW + x];
    }
  }
  const mean = sum / n;

  let std = 0;
  for (let y = 0; y < th; y++) {
    for (let x = 0; x < PW; x++) {
      std += (gray[(ty + y) * PW + x] - mean) ** 2;
    }
  }
  std = Math.sqrt(std / n) || 1;

  // 相互相関
  let corr = 0;
  const tmpl = state.tmplGray;
  const tm   = state.tmplMean;
  const ts   = state.tmplStd;
  for (let y = 0; y < th; y++) {
    for (let x = 0; x < PW; x++) {
      const fi = (ty + y) * PW + x;
      const ti = y * PW + x;
      corr += (gray[fi] - mean) * (tmpl[ti] - tm);
    }
  }
  corr /= (n * std * ts);

  // 0〜100%に正規化（-1〜1 → 0〜100）
  return (corr + 1) * 50;
}

// ─────────────────────────────────────────
//  検出ステートマシン
// ─────────────────────────────────────────
function detectCount(score) {
  const trig   = state.triggerThresh;
  const unlock = state.unlockThresh;

  switch (state.phase) {
    case 'WAIT':
      if (score >= trig) {
        state.phase = 'RISING';
      }
      break;

    case 'RISING':
      // スコアが閾値を超えた状態が続いている → 最大値を過ぎて下がり始めたらカウント
      if (score < trig) {
        // 閾値を超えてから下がった = 節の帯が通過
        triggerCount();
      }
      break;

    case 'LOCKED':
      // スコアが十分下がったらアンロック
      if (score <= unlock) {
        state.phase = 'WAIT';
        lockInd.classList.remove('show');
        statusDot.className = 'status-dot active';
      }
      break;
  }
}

function triggerCount() {
  const now = Date.now();
  if (state.lastCountTime > 0) {
    mInterval.textContent = ((now - state.lastCountTime) / 1000).toFixed(1);
  }
  state.lastCountTime = now;

  state.count++;
  state.peakScore = 0;
  updateCountDisplay();

  state.phase = 'LOCKED';
  lockInd.classList.add('show');
  statusDot.className = 'status-dot locked';

  flash.style.opacity = '1';
  setTimeout(() => { flash.style.opacity = '0'; }, 120);
  countDisplay.classList.add('bump');
  setTimeout(() => countDisplay.classList.remove('bump'), 200);
}

// ─────────────────────────────────────────
//  テンプレート枠の位置更新
// ─────────────────────────────────────────
function updateTmplFrame(dw, dh) {
  const hPct = state.tmplHeightPct;
  const frameH = Math.round(dh * hPct / 100);
  const frameY = Math.round((dh - frameH) / 2);
  tmplFrame.style.top    = frameY + 'px';
  tmplFrame.style.height = frameH + 'px';
}

// ─────────────────────────────────────────
//  オーバーレイ描画
// ─────────────────────────────────────────
function drawOverlay(dw, dh, PW, PH, gray, score) {
  octx.clearRect(0, 0, dw, dh);

  // テンプレート枠（常に表示）
  const th = state.tmplH;
  const frameH = Math.round(dh * state.tmplHeightPct / 100);
  const frameY = Math.round((dh - frameH) / 2);

  // マッチ表示モード：相関高いときテンプレート枠をハイライト
  if (state.showOverlay && state.tmplGray) {
    const alpha = Math.min(0.4, (score - state.unlockThresh) / 100);
    if (alpha > 0) {
      octx.fillStyle = `rgba(0,230,118,${alpha})`;
      octx.fillRect(0, frameY, dw - 70, frameH);
    }
  }
}

// ─────────────────────────────────────────
//  右端スコアグラフ
// ─────────────────────────────────────────
function drawScoreGraph(dh) {
  const pw = 70;
  sctx.clearRect(0, 0, pw, dh);

  // 背景
  sctx.fillStyle = 'rgba(0,0,0,0.65)';
  sctx.fillRect(0, 0, pw, dh);

  // 時系列グラフ（縦スクロール：新しいスコアが下）
  const trig   = state.triggerThresh;
  const unlock = state.unlockThresh;

  // スコア履歴を縦に描画
  const barW = pw - 6;
  const rowH = dh / SCORE_HISTORY;

  for (let i = 0; i < SCORE_HISTORY; i++) {
    const idx = (scoreHistIdx - SCORE_HISTORY + i + SCORE_HISTORY) % SCORE_HISTORY;
    const s = scoreHistory[idx];
    const y = i * rowH;
    const w = s / 100 * barW;
    const color = s >= trig ? '#ffab00' : s >= unlock ? '#00e676' : 'rgba(0,230,118,0.35)';
    sctx.fillStyle = color;
    sctx.fillRect(2, y, w, Math.max(1, rowH - 0.5));
  }

  // トリガーライン
  const tx = trig / 100 * barW + 2;
  sctx.strokeStyle = 'rgba(255,171,0,0.7)';
  sctx.lineWidth = 1;
  sctx.setLineDash([3, 3]);
  sctx.beginPath(); sctx.moveTo(tx, 0); sctx.lineTo(tx, dh); sctx.stroke();

  // アンロックライン
  const ux = unlock / 100 * barW + 2;
  sctx.strokeStyle = 'rgba(0,230,118,0.4)';
  sctx.beginPath(); sctx.moveTo(ux, 0); sctx.lineTo(ux, dh); sctx.stroke();
  sctx.setLineDash([]);

  // ラベル
  sctx.fillStyle = 'rgba(85,139,94,0.9)';
  sctx.font = '9px Courier New';
  sctx.fillText('CORR', 2, 11);
  sctx.fillStyle = 'rgba(255,171,0,0.7)';
  sctx.fillText('▲TRG', 2, dh - 13);
  sctx.fillStyle = 'rgba(0,230,118,0.6)';
  sctx.fillText('▲UNL', 2, dh - 3);
}

// ─────────────────────────────────────────
//  UI helpers
// ─────────────────────────────────────────
function updateCountDisplay() { countDisplay.textContent = state.count; }

document.getElementById('btn-reset').addEventListener('click', () => {
  state.count = 0;
  state.peakScore = 0;
  state.phase = state.tmplGray ? 'WAIT' : 'NO_TMPL';
  lockInd.classList.remove('show');
  statusDot.className = state.running ? 'status-dot active' : 'status-dot';
  mInterval.textContent = '--';
  state.lastCountTime = 0;
  updateCountDisplay();
});

document.getElementById('btn-minus1').addEventListener('click', () => {
  if (state.count > 0) { state.count--; updateCountDisplay(); }
});

document.getElementById('btn-overlay-toggle').addEventListener('click', function() {
  state.showOverlay = !state.showOverlay;
  this.style.borderColor = state.showOverlay ? 'var(--green)' : '';
  this.style.color       = state.showOverlay ? 'var(--green)' : '';
});

document.getElementById('param-toggle').addEventListener('click', () => {
  document.getElementById('params-panel').classList.toggle('open');
});

// スライダー
function bindSlider(id, valId, key, suffix, cb) {
  const el = document.getElementById(id);
  const vl = document.getElementById(valId);
  el.addEventListener('input', () => {
    state[key] = +el.value;
    vl.textContent = el.value + (suffix || '');
    if (cb) cb();
  });
}
bindSlider('p-trigger', 'v-trigger', 'triggerThresh', '');
bindSlider('p-unlock',  'v-unlock',  'unlockThresh',  '');
bindSlider('p-tmplh',   'v-tmplh',   'tmplHeightPct', '%', () => {
  const dw = video.clientWidth;
  const dh = video.clientHeight;
  updateTmplFrame(dw, dh);
});
